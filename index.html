<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Journal</title>

<style>
:root{
  --bg:#f7f6f3;
  --card:#ffffffcc;
  --text:#1f2937;
  --muted:#6b7280;
  --accent:#a78bfa;
  --shadow: 0 10px 30px rgba(0,0,0,0.06);
}

[data-theme="dark"]{
  --bg:#0f172a;
  --card:#111827cc;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --shadow: 0 10px 30px rgba(0,0,0,0.4);
}

*{
  box-sizing:border-box;
  font-family: ui-sans-serif, system-ui;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  transition:0.4s ease;
}

.app{
  display:grid;
  grid-template-columns: 280px 1fr;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  padding:20px;
  border-right:1px solid rgba(150,150,150,0.1);
  overflow:auto;
}

.logo{
  font-size:22px;
  font-weight:700;
  margin-bottom:20px;
}

.btn{
  background:var(--card);
  border:none;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  margin:6px 0;
  width:100%;
  color:var(--text);
  box-shadow:var(--shadow);
  text-align:left;
  transition:0.2s;
}

.btn:hover{transform:translateY(-2px);}

.small{
  font-size:12px;
  color:var(--muted);
}

.mode-btn{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  margin:5px 0;
  background:rgba(120,120,120,0.1);
}

.mode-btn.active{
  outline:2px solid var(--accent);
}

/* MAIN */
.main{
  padding:30px;
  overflow:auto;
}

.card{
  background:var(--card);
  box-shadow:var(--shadow);
  border-radius:22px;
  padding:22px;
  backdrop-filter: blur(12px);
}

/* TEXTAREA */
textarea{
  width:100%;
  height:220px;
  border:none;
  outline:none;
  background:transparent;
  resize:none;
  font-size:16px;
  line-height:1.7;
  color:var(--text);
}

/* MOOD */
.mood{
  font-size:24px;
  cursor:pointer;
  opacity:0.6;
}

.mood.active{
  opacity:1;
  transform:scale(1.2);
}

/* INPUT */
input{
  padding:10px;
  border-radius:12px;
  border:none;
  background:rgba(120,120,120,0.1);
  color:var(--text);
  width:100%;
}

/* CALENDAR */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}

.day{
  padding:12px;
  border-radius:12px;
  background:rgba(120,120,120,0.08);
  text-align:center;
  cursor:pointer;
}

.day.hasEntry{
  outline:1px solid var(--accent);
}

hr{
  margin:20px 0;
  border:0;
  border-top:1px solid rgba(120,120,120,0.15);
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="logo">🌿 Journal</div>

  <button class="btn" onclick="newEntry()">+ New Entry</button>
  <button class="btn" onclick="toggleTheme()">Toggle Theme</button>

  <hr/>

  <div class="small">Reflection Modes</div>

  <div class="mode-btn" onclick="setMode('peace')">🌿 Peace Mode</div>
  <div class="mode-btn" onclick="setMode('gratitude')">☀️ Gratitude Mode</div>
  <div class="mode-btn" onclick="setMode('deep')">🌙 Deep Mode</div>
  <div class="mode-btn" onclick="setMode('memory')">🎧 Memory Mode</div>

  <hr/>

  <div class="small">Search</div>
  <input id="search" oninput="renderList()" placeholder="Search..."/>

  <hr/>

  <div id="list"></div>

</div>

<!-- MAIN -->
<div class="main">

  <div class="card">

    <div class="small" id="modeLabel">Mode</div>

    <div style="display:flex;gap:10px;margin:10px 0;">
      <span class="mood" onclick="setMood('😊')">😊</span>
      <span class="mood" onclick="setMood('😌')">😌</span>
      <span class="mood" onclick="setMood('😔')">😔</span>
      <span class="mood" onclick="setMood('🔥')">🔥</span>
    </div>

    <textarea id="text"></textarea>

  </div>

  <hr/>

  <div class="card">
    <div class="small">Calendar</div>
    <div class="calendar" id="calendar"></div>
  </div>

</div>

</div>

<script>

let currentDate = new Date().toISOString().split("T")[0];
let data = JSON.parse(localStorage.getItem("journal") || "{}");

let currentMood = "";
let currentMode = "peace";

/* MODES */
const modes = {
  peace:{
    label:"🌿 Peace Mode",
    placeholder:"What made today feel calm?"
  },
  gratitude:{
    label:"☀️ Gratitude Mode",
    placeholder:"What are you grateful for today?"
  },
  deep:{
    label:"🌙 Deep Mode",
    placeholder:"What are you avoiding thinking about?"
  },
  memory:{
    label:"🎧 Memory Mode",
    placeholder:"What moment will stay with you today?"
  }
};

/* SET MODE */
function setMode(mode){
  currentMode = mode;
  updateModeUI();
  save();
}

/* UPDATE MODE UI */
function updateModeUI(){

  document.getElementById("text").placeholder =
    modes[currentMode].placeholder;

  document.getElementById("modeLabel").innerText =
    modes[currentMode].label;

  document.querySelectorAll(".mode-btn").forEach(el=>{
    el.classList.remove("active");
  });

  document.querySelectorAll(".mode-btn").forEach(el=>{
    if(el.innerText.includes(modes[currentMode].label.split(" ")[0])){
      el.classList.add("active");
    }
  });
}

/* SAVE */
function save(){

  data[currentDate] = {
    text: document.getElementById("text").value,
    mood: currentMood,
    mode: currentMode
  };

  localStorage.setItem("journal", JSON.stringify(data));

  renderList();
  renderCalendar();
}

/* LOAD */
function load(date){

  currentDate = date;

  let entry = data[date] || {};

  document.getElementById("text").value = entry.text || "";

  currentMood = entry.mood || "";
  currentMode = entry.mode || "peace";

  updateModeUI();
  updateMoodUI();
}

/* NEW ENTRY */
function newEntry(){
  load(new Date().toISOString().split("T")[0]);
}

/* TEXT */
document.getElementById("text").addEventListener("input", save);

/* MOOD */
function setMood(m){
  currentMood = m;
  updateMoodUI();
  save();
}

function updateMoodUI(){
  document.querySelectorAll(".mood").forEach(el=>{
    el.classList.toggle("active", el.innerText === currentMood);
  });
}

/* SEARCH */
function renderList(){

  let q = document.getElementById("search").value.toLowerCase();

  let list = Object.keys(data)
    .filter(d => JSON.stringify(data[d]).toLowerCase().includes(q))
    .sort()
    .reverse();

  document.getElementById("list").innerHTML =
    list.map(d=>`
      <div class="btn" onclick="load('${d}')">
        ${d} ${data[d].mood || ""}
      </div>
    `).join("");
}

/* CALENDAR */
function renderCalendar(){

  let cal = document.getElementById("calendar");
  cal.innerHTML = "";

  for(let i=1;i<=30;i++){

    let d = new Date();
    d.setDate(i);

    let date = d.toISOString().split("T")[0];

    let has = data[date] ? "hasEntry" : "";

    cal.innerHTML += `
      <div class="day ${has}" onclick="load('${date}')">
        ${i}
      </div>
    `;
  }
}

/* THEME */
function toggleTheme(){
  document.body.dataset.theme =
    document.body.dataset.theme === "dark"
      ? "light"
      : "dark";
}

/* INIT */
load(currentDate);
renderList();
renderCalendar();
updateModeUI();

</script>

</body>
</html>
