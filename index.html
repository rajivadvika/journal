<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cottagecore Living Journal</title>

<style>
/* =========================
   🌸 COTTAGECORE THEME
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#f6f1e7;
  --bg2:#efe6d6;
  --text:#3b2f2f;
  --card:rgba(255, 250, 240, 0.85);
  --accent:#b07d62;
  --accent2:#8fbc8f;
  --glow:rgba(176,125,98,0.25);
  --shadow:0 8px 25px rgba(0,0,0,0.08);
  --border:rgba(80,60,50,0.12);
}

body{
  font-family:'Georgia', serif;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.5), transparent 60%),
    linear-gradient(135deg,var(--bg),var(--bg2));
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* Night = candle forest */
body.night{
  --bg:#1a1410;
  --bg2:#231b16;
  --text:#f3e9dc;
  --card:rgba(40,30,25,0.75);
  --accent:#d8a48f;
  --accent2:#9dbf9e;
  --glow:rgba(216,164,143,0.3);
}

/* soft paper texture */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  opacity:0.25;
  pointer-events:none;
  z-index:0;
}

/* =========================
   LAYOUT
========================= */

.app{
  display:grid;
  grid-template-columns:240px 1fr 280px;
  min-height:100vh;
  position:relative;
  z-index:1;
}

@media(max-width:900px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}
}

/* =========================
   TOP BAR
========================= */

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:60px;
  background:var(--card);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px);
}

.logo{
  font-size:1.2rem;
  font-weight:600;
}

.stat{
  background:linear-gradient(135deg,var(--accent),#c89f94);
  padding:6px 14px;
  border-radius:20px;
  color:white;
  font-size:0.85rem;
}

/* =========================
   PANELS (soft paper cards)
========================= */

.sidebar, .panel, .journal-box{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  backdrop-filter: blur(12px);
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
  padding:80px 16px 20px;
}

.folder{
  padding:12px;
  margin:6px 0;
  border-left:4px solid var(--accent);
  border-radius:10px;
  background:rgba(255,255,255,0.5);
  cursor:pointer;
  font-style:italic;
  transition:0.3s;
}

.folder:hover{
  transform:translateX(4px);
  background:rgba(176,125,98,0.1);
}

.folder.active{
  background:rgba(176,125,98,0.2);
  border-left:6px solid var(--accent);
}

.btn{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,var(--accent),#c89f94);
  color:white;
  cursor:pointer;
  transition:0.3s;
  font-family:inherit;
}

.btn:hover{
  transform:translateY(-2px);
}

/* =========================
   MAIN
========================= */

.main{
  padding:80px 30px 30px;
}

.journal-box{
  padding:24px;
}

textarea{
  width:100%;
  min-height:180px;
  border:none;
  outline:none;
  background:transparent;
  font-family:'Garamond', serif;
  font-size:1.15rem;
  line-height:1.9;
  color:var(--text);
}

textarea::placeholder{
  font-style:italic;
  color:rgba(80,60,50,0.4);
}

/* =========================
   GARDEN (wild meadow feel)
========================= */

.garden{
  margin-top:20px;
  min-height:300px;
  border-radius:20px;
  background:linear-gradient(to top, rgba(143,188,143,0.15), transparent);
  position:relative;
  overflow:hidden;
}

.plant{
  position:absolute;
  bottom:0;
  animation: float 6s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

.plant-head{
  border-radius:50% 60% 55% 65%;
}

.plant-stem{
  width:3px;
  margin:0 auto;
  background:linear-gradient(to top,#5c7c5c,#8fbc8f);
}

/* =========================
   BUTTONS / TOGGLES
========================= */

.toggle-btn{
  padding:8px;
  border-radius:10px;
  border:none;
  background:rgba(176,125,98,0.15);
  cursor:pointer;
}

.toggle-btn.active{
  background:var(--accent);
  color:white;
}

/* =========================
   SHOP / ACHIEVEMENTS
========================= */

.shop-item{
  background:rgba(255,255,255,0.4);
  padding:12px;
  border-radius:12px;
  margin:8px 0;
}

.achievement{
  padding:10px;
  border-radius:12px;
  background:rgba(176,125,98,0.1);
  margin:8px 0;
}

.achievement.locked{
  opacity:0.4;
}

/* =========================
   EFFECTS (softened)
========================= */

.shimmer, .spark{
  opacity:0.6;
}

.trail{
  background:rgba(176,125,98,0.5);
}

.notification{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--card);
  padding:14px 20px;
  border-radius:14px;
  transition:0.4s;
}

.notification.show{
  transform:translateX(-50%) translateY(0);
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">🌿 Cottage Journal</div>
  <div>
    <span class="stat">🔥 <span id="streak">0</span></span>
    <span class="stat">🪙 <span id="coins">0</span></span>
  </div>
</div>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>📖 Entries</h3>
    <div id="folders"></div>
    <button class="btn" onclick="newEntry()">✨ New Entry</button>

    <h3>🌙 Mode</h3>
    <button onclick="setMode('day')" class="toggle-btn" id="dayBtn">☀️ Day</button>
    <button onclick="setMode('night')" class="toggle-btn" id="nightBtn">🌙 Night</button>

    <h3>🌦 Weather</h3>
    <button onclick="setWeather('sun')" class="toggle-btn">☀️</button>
    <button onclick="setWeather('rain')" class="toggle-btn">🌧</button>
    <button onclick="setWeather('fog')" class="toggle-btn">🌫</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="journal-box">
      <h2 id="entryTitle">Today</h2>
      <textarea id="journalText" placeholder="Write your thoughts like pressed flowers in a book..."></textarea>
      <div id="wordCount">0 words</div>
    </div>

    <div class="garden" id="garden"></div>
  </main>

  <!-- RIGHT PANEL -->
  <aside class="panel">
    <h3>🛒 Shop</h3>
    <div id="shop"></div>

    <h3>🏆 Achievements</h3>
    <div id="achievements"></div>
  </aside>

</div>

<!-- NOTIFICATION -->
<div class="notification" id="notification"></div>

<script>

*/
</script>

</body>
</html>
