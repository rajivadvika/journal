<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Journal</title>

<style>
:root{
  --bg:#f7f6f3;
  --card:#ffffffcc;
  --text:#1f2937;
  --muted:#6b7280;
  --accent:#a78bfa;
  --shadow: 0 10px 30px rgba(0,0,0,0.06);
}

[data-theme="dark"]{
  --bg:#0f172a;
  --card:#111827cc;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --shadow: 0 10px 30px rgba(0,0,0,0.4);
}

*{
  box-sizing:border-box;
  font-family: ui-sans-serif, system-ui;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  transition:0.4s ease;
}

.app{
  display:grid;
  grid-template-columns: 280px 1fr;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  padding:20px;
  border-right:1px solid rgba(150,150,150,0.1);
  overflow:auto;
}

.logo{
  font-size:22px;
  font-weight:700;
  margin-bottom:20px;
}

.btn{
  background:var(--card);
  border:none;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  margin:6px 0;
  width:100%;
  color:var(--text);
  box-shadow:var(--shadow);
  text-align:left;
  transition:0.2s;
}

.btn:hover{transform:translateY(-2px);}

.small{
  font-size:12px;
  color:var(--muted);
}

/* MAIN */
.main{
  padding:30px;
  overflow:auto;
}

.card{
  background:var(--card);
  box-shadow:var(--shadow);
  border-radius:22px;
  padding:22px;
  backdrop-filter: blur(12px);
}

/* FLOWER 🌸 */
.flower-wrap{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  height:160px;
  margin-bottom:10px;
}

.stem{
  width:6px;
  height:20px;
  background:#22c55e;
  border-radius:10px;
  transition:0.3s ease;
}

.flower{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.petals{
  width:30px;
  height:30px;
  border-radius:50%;
  background:radial-gradient(circle, #f472b6, #a78bfa);
  position:absolute;
  top:-20px;
  opacity:0.2;
  transform:scale(0.5);
  transition:0.3s ease;
}

/* TEXTAREA */
textarea{
  width:100%;
  height:220px;
  border:none;
  outline:none;
  background:transparent;
  resize:none;
  font-size:16px;
  line-height:1.7;
  color:var(--text);
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
  <div class="logo">🌿 Journal</div>
</div>

<div class="main">

  <div class="card">

    <div class="flower-wrap">
      <div class="flower">
        <div class="stem" id="stem"></div>
        <div class="petals" id="petals"></div>
      </div>
    </div>

    <textarea id="text" placeholder="Start typing..."></textarea>

  </div>

</div>

</div>

<script>

const text = document.getElementById("text");
const stem = document.getElementById("stem");
const petals = document.getElementById("petals");

function updateFlower(){

  let len = text.value.length;

  // Stem grows with text
  let height = Math.min(180, 20 + len * 2);
  stem.style.height = height + "px";

  // Flower blooms with text
  let bloom = Math.min(1, len / 80);

  petals.style.opacity = 0.2 + bloom * 0.8;
  petals.style.transform = `scale(${0.5 + bloom})`;
}

/* typing */
text.addEventListener("input", updateFlower);

updateFlower();

</script>

</body>
</html>
