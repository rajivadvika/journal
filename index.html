<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Living Journal</title>

<style>
:root{
  --bg:#f7f6f3;
  --text:#1f2937;
  --accent:#a78bfa;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* DARK MODE */
body.dark{
  --bg:#0b1020;
  --text:#e5e7eb;
  background:var(--bg);
}

/* layout */
.wrap{
  display:flex;
  height:100vh;
}

/* left writing */
.panel{
  width:40%;
  padding:30px;
}

textarea{
  width:100%;
  height:300px;
  border:none;
  outline:none;
  font-size:16px;
  background:transparent;
  color:inherit;
  resize:none;
}

/* flower */
.flowerBox{
  width:60%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.stem{
  width:6px;
  background:#22c55e;
  height:20px;
  border-radius:10px;
  transition:0.15s linear;
}

.bloom{
  width:20px;
  height:20px;
  border-radius:50%;
  background:radial-gradient(circle, #f472b6, #a78bfa);
  position:absolute;
  top:-18px;
  opacity:0.3;
  transform:scale(0.5);
  transition:0.15s linear;
}

/* shimmer trail */
.shimmer{
  position:fixed;
  width:10px;
  height:10px;
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle, rgba(255,255,255,0.9), transparent);
  animation:fade 0.6s forwards;
}

@keyframes fade{
  to{opacity:0; transform:scale(3);}
}

/* fireflies */
.firefly{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  background:rgba(255,255,180,0.9);
  box-shadow:0 0 10px rgba(255,255,150,0.8);
  animation:float 6s infinite ease-in-out;
  pointer-events:none;
}

@keyframes float{
  0%{transform:translate(0,0);}
  50%{transform:translate(40px,-60px);}
  100%{transform:translate(0,0);}
}
</style>
</head>

<body>

<div class="wrap">

  <div class="panel">
    <h2>🌿 Living Journal</h2>
    <button onclick="toggleDark()">Toggle Dark</button>

    <textarea id="text" placeholder="Start writing..."></textarea>
  </div>

  <div class="flowerBox">
    <div class="stem" id="stem"></div>
    <div class="bloom" id="bloom"></div>
  </div>

</div>

<script>

const text = document.getElementById("text");
const stem = document.getElementById("stem");
const bloom = document.getElementById("bloom");

/* 🌸 FLOWER GROWS PER LETTER */
text.addEventListener("input", () => {

  let len = text.value.length;

  // stem grows
  stem.style.height = Math.min(300, 20 + len * 4) + "px";

  // bloom opens
  let p = Math.min(1, len / 120);

  bloom.style.opacity = 0.2 + p;
  bloom.style.transform = `scale(${0.5 + p})`;
});

/* ✨ SHIMMER FOLLOW MOUSE */
document.addEventListener("mousemove", (e) => {

  let s = document.createElement("div");
  s.className = "shimmer";
  s.style.left = e.clientX + "px";
  s.style.top = e.clientY + "px";

  document.body.appendChild(s);

  setTimeout(() => s.remove(), 600);
});

/* 🪲 FIREFLIES (ONLY DARK MODE) */
function spawnFireflies(){

  for(let i=0;i<18;i++){

    let f = document.createElement("div");
    f.className = "firefly";

    f.style.left = Math.random()*100 + "vw";
    f.style.top = Math.random()*100 + "vh";
    f.style.animationDuration = (4 + Math.random()*4) + "s";
    f.style.opacity = 0.4 + Math.random()*0.6;

    document.body.appendChild(f);
  }
}

/* toggle dark + fireflies */
function toggleDark(){

  document.body.classList.toggle("dark");

  document.querySelectorAll(".firefly").forEach(f => f.remove());

  if(document.body.classList.contains("dark")){
    spawnFireflies();
  }
}

</script>

</body>
</html>
