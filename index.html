<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Living Memory World Prototype</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  overflow:hidden;
  background:#0f1220;
  color:white;
}

/* LAYOUT */
.wrap{
  display:grid;
  grid-template-columns:1.2fr 0.8fr;
  height:100vh;
}

/* WORLD */
.world{
  position:relative;
  overflow:hidden;
  background:radial-gradient(circle at center, #1a1f3a, #070a14);
}

/* avatar */
.avatar{
  position:absolute;
  top:40px;
  left:40px;
  width:120px;
  height:120px;
  border-radius:50%;
  background:linear-gradient(145deg,#5eead4,#60a5fa);
  box-shadow:0 0 20px rgba(96,165,250,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  transition:0.4s ease;
  animation: breathe 3s infinite ease-in-out;
}

@keyframes breathe{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

/* particles */
.entity{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  pointer-events:none;
  opacity:0.9;
}

/* UI */
.panel{
  background:#0b1020;
  padding:12px;
  display:flex;
  flex-direction:column;
}

textarea{
  flex:1;
  background:#12182c;
  border:none;
  color:white;
  padding:10px;
  outline:none;
  resize:none;
  font-size:14px;
  border-radius:8px;
}

/* chat */
.chat{
  height:200px;
  overflow:auto;
  margin-top:10px;
  background:#0f152a;
  padding:10px;
  border-radius:8px;
  font-size:13px;
}

/* coin */
.coin{
  padding:8px;
  background:#1f2a44;
  margin-bottom:8px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="wrap">

  <!-- WORLD -->
  <div class="world" id="world">
    <div class="avatar" id="avatar">🙂</div>
  </div>

  <!-- PANEL -->
  <div class="panel">

    <div class="coin">🪙 Coins: <span id="coins">0</span></div>

    <textarea id="text" placeholder="Write your thoughts..."></textarea>

    <div class="chat" id="chat"></div>

  </div>

</div>

<script>

/* =========================
   STATE ENGINE
========================= */

let coins = 0;

let memory = JSON.parse(localStorage.getItem("memoryWorld") || JSON.stringify({
  messages: [],
  moodHistory: []
}));

let entities = [];

const world = document.getElementById("world");
const avatar = document.getElementById("avatar");
const chat = document.getElementById("chat");
const text = document.getElementById("text");

/* =========================
   EMOTION ENGINE
========================= */

function getMood(t){
  t = t.toLowerCase();

  if(t.includes("love") || t.includes("happy")) return "happy";
  if(t.includes("sad") || t.includes("lonely")) return "sad";
  if(t.includes("angry")) return "angry";
  if(t.includes("calm")) return "calm";
  return "neutral";
}

/* =========================
   AVATAR SYSTEM
========================= */

function updateAvatar(mood){

  const moods = {
    happy:"😄",
    sad:"😔",
    angry:"😠",
    calm:"😌",
    neutral:"🙂"
  };

  avatar.innerText = moods[mood] || "🙂";

  if(mood === "happy"){
    avatar.style.background = "linear-gradient(145deg,#f472b6,#facc15)";
  }
  else if(mood === "sad"){
    avatar.style.background = "linear-gradient(145deg,#60a5fa,#1e3a8a)";
  }
  else if(mood === "angry"){
    avatar.style.background = "linear-gradient(145deg,#f87171,#7f1d1d)";
  }
  else {
    avatar.style.background = "linear-gradient(145deg,#5eead4,#60a5fa)";
  }
}

/* =========================
   MEMORY SYSTEM
========================= */

function saveMemory(text,mood){

  memory.messages.push({text,mood,time:Date.now()});
  memory.moodHistory.push(mood);

  if(memory.messages.length > 50) memory.messages.shift();

  localStorage.setItem("memoryWorld", JSON.stringify(memory));
}

/* =========================
   THOUGHT BEINGS (PHYSICS)
========================= */

function spawnEntities(text,mood){

  let words = text.split(/\s+/);

  words.forEach(w => {
    if(!w) return;

    entities.push({
      x:Math.random()*window.innerWidth*0.6,
      y:Math.random()*window.innerHeight,
      vx:(Math.random()-0.5)*2,
      vy:(Math.random()-0.5)*2,
      mood
    });
  });
}

/* physics loop */
function updateEntities(){

  world.querySelectorAll(".entity").forEach(e=>e.remove());

  entities.forEach(ent => {

    // simple physics
    ent.x += ent.vx;
    ent.y += ent.vy;

    // boundaries
    if(ent.x<0 || ent.x>window.innerWidth*0.6) ent.vx *= -1;
    if(ent.y<0 || ent.y>window.innerHeight) ent.vy *= -1;

    // mood behavior
    if(ent.mood === "happy") ent.vx *= 1.01;
    if(ent.mood === "sad") ent.vx *= 0.99;
    if(ent.mood === "angry") ent.vx *= 1.03;

    let d = document.createElement("div");
    d.className = "entity";

    if(ent.mood === "happy") d.style.background="#facc15";
    else if(ent.mood === "sad") d.style.background="#60a5fa";
    else if(ent.mood === "angry") d.style.background="#f87171";
    else d.style.background="#34d399";

    d.style.left = ent.x + "px";
    d.style.top = ent.y + "px";

    world.appendChild(d);
  });

  requestAnimationFrame(updateEntities);
}

/* =========================
   AUDIO ENGINE
========================= */

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq){

  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  osc.frequency.value = freq;
  osc.type = "sine";

  gain.gain.value = 0.03;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

function moodSound(mood){
  if(mood==="happy") playTone(600);
  else if(mood==="sad") playTone(200);
  else if(mood==="angry") playTone(120);
  else playTone(400);
}

/* =========================
   INPUT SYSTEM
========================= */

text.addEventListener("input", () => {

  coins++;
  document.getElementById("coins").innerText = coins;

  let mood = getMood(text.value);

  updateAvatar(mood);
  saveMemory(text.value,mood);
  spawnEntities(text.value,mood);
  moodSound(mood);

  addChat("You", text.value.slice(-30));
});

/* =========================
   CHAT SYSTEM
========================= */

function addChat(who,msg){

  let div = document.createElement("div");
  div.innerText = `${who}: ${msg}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  if(who==="You"){
    setTimeout(()=>{
      let last = memory.messages[memory.messages.length-1];
      if(!last) return;

      let reply =
        last.mood==="happy" ? "You feel bright today." :
        last.mood==="sad" ? "I notice a heaviness in you." :
        last.mood==="angry" ? "That energy is strong." :
        "I'm here with you.";

      addChat("AI",reply);
    },600);
  }
}

/* =========================
   START SYSTEMS
========================= */

updateEntities();

</script>

</body>
</html>
