<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Journal Ecosystem</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#f0f7f4;
  --bg2:#e8f5e9;
  --text:#2d3436;
  --card:rgba(255,255,255,0.85);
  --accent:#81c784;
  --glow:rgba(129,199,132,0.3);
}

body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:linear-gradient(135deg,var(--bg),var(--bg2));
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  transition:all 0.8s ease;
}

body.night{
  --bg:#0a0f1a;
  --bg2:#111827;
  --text:#e0e7ff;
  --card:rgba(30,41,59,0.85);
  --accent:#818cf8;
  --glow:rgba(129,140,248,0.4);
}

/* Layout */
.app{
  display:grid;
  grid-template-columns:240px 1fr 280px;
  min-height:100vh;
  position:relative;
}

@media(max-width:900px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}
  .sidebar,.panel{max-height:200px;overflow:auto}
}

/* Header Bar */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  height:60px;
  background:var(--card);
  backdrop-filter:blur(20px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  z-index:100;
  border-bottom:1px solid rgba(120,120,120,0.1);
}

.logo{
  font-size:1.4rem;
  font-weight:600;
  display:flex;align-items:center;gap:8px;
}

.stats{display:flex;gap:16px;align-items:center}

.stat{
  background:linear-gradient(135deg,#ffd700,#ffb347);
  padding:6px 14px;
  border-radius:20px;
  font-weight:600;
  font-size:0.9rem;
  color:#1a1a1a;
  box-shadow:0 2px 10px rgba(255,215,0,0.3);
}

.streak{background:linear-gradient(135deg,#ff6b6b,#ee5a24)}
.streak{color:#fff}

/* Sidebar */
.sidebar{
  padding:80px 16px 20px;
  background:var(--card);
  backdrop-filter:blur(10px);
  border-right:1px solid rgba(120,120,120,0.1);
  overflow-y:auto;
}

.sidebar h3{
  font-size:0.85rem;
  text-transform:uppercase;
  letter-spacing:1px;
  opacity:0.6;
  margin:20px 0 10px;
}

.folder{
  padding:12px 14px;
  margin:6px 0;
  background:rgba(129,199,132,0.15);
  border-radius:12px;
  cursor:pointer;
  transition:all 0.3s;
  font-size:0.95rem;
}

.folder:hover{background:rgba(129,199,132,0.3);transform:translateX(4px)}
.folder.active{background:var(--accent);color:#fff}

.btn{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:#fff;
  font-size:0.95rem;
  cursor:pointer;
  transition:all 0.3s;
}

.btn:hover{transform:scale(1.02);box-shadow:0 4px 15px var(--glow)}

.controls{margin-top:20px}

.toggle-row{
  display:flex;
  gap:8px;
  margin:8px 0;
  flex-wrap:wrap;
}

.toggle-btn{
  flex:1;
  padding:10px 8px;
  border:none;
  border-radius:10px;
  background:rgba(120,120,120,0.1);
  color:var(--text);
  cursor:pointer;
  font-size:0.85rem;
  transition:all 0.3s;
  min-width:60px;
}

.toggle-btn:hover{background:rgba(120,120,120,0.2)}
.toggle-btn.active{background:var(--accent);color:#fff}

/* Main Area */
.main{
  padding:80px 30px 30px;
  position:relative;
  display:flex;
  flex-direction:column;
}

.journal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.journal-header h2{font-size:1.5rem;font-weight:600}

.mood-indicator{
  padding:6px 14px;
  border-radius:20px;
  font-size:0.85rem;
  background:var(--card);
}

.journal-box{
  background:var(--card);
  border-radius:20px;
  padding:24px;
  box-shadow:0 8px 32px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

textarea{
  width:100%;
  min-height:180px;
  border:none;
  outline:none;
  background:transparent;
  font-size:1.1rem;
  line-height:1.8;
  color:var(--text);
  resize:vertical;
  font-family:inherit;
}

textarea::placeholder{opacity:0.5}

.word-count{
  text-align:right;
  font-size:0.85rem;
  opacity:0.5;
  margin-top:10px;
}

/* Garden */
.garden{
  flex:1;
  position:relative;
  min-height:300px;
  border-radius:20px;
  background:linear-gradient(180deg,transparent 0%,rgba(129,199,132,0.1) 100%);
  overflow:hidden;
}

.plant{
  position:absolute;
  bottom:0;
  transform-origin:bottom center;
  transition:all 0.5s ease;
  cursor:pointer;
}

.plant:hover{transform:scale(1.1)}

.plant-stem{
  width:3px;
  background:linear-gradient(to top,#4a7c59,#81c784);
  border-radius:2px;
  margin:0 auto;
}

.plant-head{
  width:20px;
  height:20px;
  border-radius:50%;
  margin:-5px auto 0;
  box-shadow:0 0 20px var(--glow);
  animation:sway 3s ease-in-out infinite;
}

@keyframes sway{
  0%,100%{transform:rotate(-3deg)}
  50%{transform:rotate(3deg)}
}

@keyframes glow-pulse{
  0%,100%{box-shadow:0 0 10px var(--glow)}
  50%{box-shadow:0 0 30px var(--glow),0 0 50px var(--glow)}
}

body.night .plant-head{animation:sway 3s ease-in-out infinite,glow-pulse 2s ease-in-out infinite}

/* Creatures */
.creature{
  position:fixed;
  font-size:24px;
  pointer-events:none;
  z-index:50;
  transition:transform 0.1s linear;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}

body.night .creature{filter:drop-shadow(0 0 10px rgba(255,255,255,0.5))}

.creature.butterfly{animation:flutter 0.3s ease-in-out infinite alternate}
@keyframes flutter{
  from{transform:scaleX(1)}
  to{transform:scaleX(0.8)}
}

/* Light Trail */
.trail{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  background:rgba(255,255,255,0.6);
  pointer-events:none;
  z-index:49;
}

body.night .trail{
  background:rgba(200,200,255,0.8);
  box-shadow:0 0 10px rgba(200,200,255,0.8);
}

/* Right Panel */
.panel{
  padding:80px 16px 20px;
  background:var(--card);
  backdrop-filter:blur(10px);
  border-left:1px solid rgba(120,120,120,0.1);
  overflow-y:auto;
}

.panel h3{
  font-size:0.85rem;
  text-transform:uppercase;
  letter-spacing:1px;
  opacity:0.6;
  margin:20px 0 10px;
}

.shop-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px;
  margin:8px 0;
  background:rgba(120,120,120,0.08);
  border-radius:14px;
  cursor:pointer;
  transition:all 0.3s;
}

.shop-item:hover{background:rgba(120,120,120,0.15);transform:scale(1.02)}

.shop-item .icon{font-size:1.8rem}
.shop-item .info{flex:1;margin-left:12px}
.shop-item .name{font-weight:600;font-size:0.95rem}
.shop-item .desc{font-size:0.8rem;opacity:0.6}
.shop-item .price{
  background:linear-gradient(135deg,#ffd700,#ffb347);
  padding:4px 10px;
  border-radius:12px;
  font-weight:600;
  font-size:0.85rem;
  color:#1a1a1a;
}

.achievement{
  padding:12px;
  margin:8px 0;
  background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,179,71,0.15));
  border-radius:12px;
  border:1px solid rgba(255,215,0,0.3);
}

.achievement.locked{opacity:0.4;filter:grayscale(1)}
.achievement .title{font-weight:600;font-size:0.9rem}
.achievement .desc{font-size:0.8rem;opacity:0.7;margin-top:4px}

/* Weather Effects */
.weather-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  pointer-events:none;
  z-index:10;
}

.raindrop{
  position:absolute;
  width:2px;
  height:20px;
  background:linear-gradient(to bottom,transparent,rgba(100,180,255,0.6));
  animation:rain 0.5s linear infinite;
}

@keyframes rain{
  from{transform:translateY(-20px)}
  to{transform:translateY(100vh)}
}

.fog{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(200,200,200,0.3);
  animation:fog-drift 10s ease-in-out infinite;
}

body.night .fog{background:rgba(100,100,150,0.3)}

@keyframes fog-drift{
  0%,100%{opacity:0.3;transform:translateX(-5%)}
  50%{opacity:0.5;transform:translateX(5%)}
}

.lightning{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.9);
  opacity:0;
}

/* Particles */
.particle{
  position:fixed;
  width:4px;
  height:4px;
  border-radius:50%;
  pointer-events:none;
  z-index:5;
}

.firefly{
  background:rgba(255,255,200,0.9);
  box-shadow:0 0 10px rgba(255,255,200,0.8),0 0 20px rgba(255,255,200,0.5);
  animation:firefly-glow 2s ease-in-out infinite;
}

@keyframes firefly-glow{
  0%,100%{opacity:0.3;transform:scale(0.8)}
  50%{opacity:1;transform:scale(1.2)}
}

/* Mouse Shimmer */
.shimmer{
  position:fixed;
  width:8px;
  height:8px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,0.8),transparent);
  pointer-events:none;
  z-index:200;
  animation:shimmer-fade 0.6s ease-out forwards;
}

@keyframes shimmer-fade{
  from{opacity:1;transform:scale(1)}
  to{opacity:0;transform:scale(2)}
}

/* Growth Spark */
.spark{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  pointer-events:none;
  z-index:100;
  animation:spark-burst 0.8s ease-out forwards;
}

@keyframes spark-burst{
  0%{opacity:1;transform:scale(0)}
  50%{opacity:1;transform:scale(1.5)}
  100%{opacity:0;transform:scale(0) translateY(-30px)}
}

/* Legendary Plant */
.legendary{
  animation:legendary-glow 1s ease-in-out infinite;
}

@keyframes legendary-glow{
  0%,100%{filter:drop-shadow(0 0 10px gold) drop-shadow(0 0 20px gold)}
  50%{filter:drop-shadow(0 0 20px gold) drop-shadow(0 0 40px gold) drop-shadow(0 0 60px rgba(255,215,0,0.5))}
}

/* Notification */
.notification{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--card);
  padding:16px 24px;
  border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
  z-index:1000;
  transition:transform 0.4s ease;
  backdrop-filter:blur(10px);
}

.notification.show{transform:translateX(-50%) translateY(0)}

/* Decay overlay */
.decay-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(100,100,100,0.2);
  pointer-events:none;
  z-index:1;
  opacity:0;
  transition:opacity 1s;
}

</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="logo">🌱 Living Journal</div>
  <div class="stats">
    <div class="stat streak">🔥 <span id="streak">0</span> day streak</div>
    <div class="stat">🪙 <span id="coins">0</span></div>
  </div>
</div>

<!-- Weather Overlay -->
<div class="weather-overlay" id="weatherOverlay"></div>

<!-- Decay Overlay -->
<div class="decay-overlay" id="decayOverlay"></div>

<!-- Main App -->
<div class="app">

  <!-- Left Sidebar -->
  <aside class="sidebar">
    <h3>📅 Journal Entries</h3>
    <div id="folders"></div>
    <button class="btn" onclick="newEntry()">✨ New Entry</button>
    
    <div class="controls">
      <h3>🌙 Environment</h3>
      <div class="toggle-row">
        <button class="toggle-btn" id="dayBtn" onclick="setMode('day')">☀️ Day</button>
        <button class="toggle-btn" id="nightBtn" onclick="setMode('night')">🌙 Night</button>
      </div>
      
      <h3>🌦️ Weather</h3>
      <div class="toggle-row">
        <button class="toggle-btn active" id="sunBtn" onclick="setWeather('sun')">☀️</button>
        <button class="toggle-btn" id="rainBtn" onclick="setWeather('rain')">🌧️</button>
        <button class="toggle-btn" id="fogBtn" onclick="setWeather('fog')">🌫️</button>
        <button class="toggle-btn" id="stormBtn" onclick="setWeather('storm')">⚡</button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <div class="journal-header">
      <h2 id="entryTitle">Today's Entry</h2>
      <div class="mood-indicator" id="moodIndicator">😊 Neutral</div>
    </div>
    
    <div class="journal-box">
      <textarea id="journalText" placeholder="Write your thoughts here... Each word grows a plant in your garden ✨"></textarea>
      <div class="word-count"><span id="wordCount">0</span> words</div>
    </div>
    
    <div class="garden" id="garden"></div>
  </main>

  <!-- Right Panel -->
  <aside class="panel">
    <h3>🛒 Ecosystem Shop</h3>
    <div id="shop"></div>
    
    <h3>🏆 Achievements</h3>
    <div id="achievements"></div>
  </aside>

</div>

<!-- Notification -->
<div class="notification" id="notification"></div>

<script>
// ========== STATE ==========
const state = {
  entries: JSON.parse(localStorage.getItem('lj_entries') || '{}'),
  coins: parseInt(localStorage.getItem('lj_coins') || '0'),
  streak: parseInt(localStorage.getItem('lj_streak') || '0'),
  lastWrite: localStorage.getItem('lj_lastWrite') || null,
  creatures: JSON.parse(localStorage.getItem('lj_creatures') || '[]'),
  achievements: JSON.parse(localStorage.getItem('lj_achievements') || '[]'),
  purchased: JSON.parse(localStorage.getItem('lj_purchased') || '{}'),
  mode: localStorage.getItem('lj_mode') || 'day',
  weather: 'sun',
  currentDate: new Date().toISOString().split('T')[0],
  mood: 'neutral',
  typingSpeed: 0,
  lastKeyTime: Date.now()
};

// ========== SHOP ITEMS ==========
const shopItems = [
  {id:'bug', name:'🐞 Ladybug', desc:'Roams your garden', price:20, emoji:'🐞'},
  {id:'butterfly', name:'🦋 Butterfly', desc:'Flutters gracefully', price:35, emoji:'🦋'},
  {id:'bee', name:'🐝 Busy Bee', desc:'Buzzes around plants', price:30, emoji:'🐝'},
  {id:'firefly', name:'✨ Firefly', desc:'Glows at night', price:50, emoji:'✨'},
  {id:'dragonfly', name:'🪰 Dragonfly', desc:'Swift and elegant', price:45, emoji:'🪰'},
  {id:'leaves', name:'🍃 Floating Leaves', desc:'Drifts peacefully', price:25, emoji:'🍃'},
  {id:'sparkle', name:'💫 Magic Sparkle', desc:'Adds enchantment', price:60, emoji:'💫'}
];

// ========== ACHIEVEMENTS ==========
const achievementDefs = [
  {id:'first', name:'🌱 First Seed', desc:'Write your first entry', check:()=>Object.keys(state.entries).length>=1},
  {id:'week', name:'🔥 Week Warrior', desc:'7-day writing streak', check:()=>state.streak>=7, reward:'🦋'},
  {id:'month', name:'🏆 Monthly Master', desc:'30-day writing streak', check:()=>state.streak>=30, reward:'🌈'},
  {id:'words100', name:'📝 Centurion', desc:'Write 100 words in one entry', check:()=>false}, // checked on write
  {id:'words500', name:'📚 Novelist', desc:'Write 500 words in one entry', check:()=>false},
  {id:'collector', name:'🎨 Collector', desc:'Own 5 different creatures', check:()=>Object.keys(state.purchased).length>=5},
  {id:'rich', name:'💰 Prosperous', desc:'Earn 500 coins total', check:()=>state.coins>=500},
  {id:'legendary', name:'🌟 Legendary', desc:'Grow a legendary plant', check:()=>false}
];

// ========== SENTIMENT ANALYSIS ==========
const sentimentWords = {
  positive: ['love','happy','joy','amazing','wonderful','grateful','blessed','excited','beautiful','fantastic','great','awesome','perfect','smile','laugh','fun','hope','dream','peace','kind','gentle','warm','bright','sunshine','celebrate','win','success','friend','family','heart','hug','kiss','sweet','delightful','paradise','magic','miracle','treasure','angel','heaven','glory','brilliant','excellent','superb','magnificent','glorious','radiant','blissful','ecstatic','euphoric','thrilled','overjoyed','elated','cheerful','merry','jolly','content','satisfied','pleased','thankful','appreciate'],
  calm: ['peace','calm','serene','quiet','gentle','soft','slow','breathe','relax','rest','still','tranquil','meditate','mindful','zen','harmony','balance','flow','ease','comfort','soothe','drift','float','dream','sleep','tender','mellow','smooth','silent','whisper','dawn','dusk','sunset','lake','ocean','wave','breeze','cloud','sky','moon','star','garden','forest','meadow','stream'],
  negative: ['sad','angry','hate','fear','worry','stress','pain','hurt','cry','alone','lonely','lost','broken','tired','exhausted','frustrated','anxious','nervous','scared','afraid','terrible','awful','horrible','worst','fail','failure','regret','sorry','miss','gone','dark','cold','empty','numb','stuck','trapped','helpless','hopeless','despair','grief','mourn','suffer','struggle','fight','battle','war','conflict','chaos','storm','thunder','rage','fury','bitter','harsh','cruel','mean']
};

// ========== INIT ==========
function init(){
  updateUI();
  renderFolders();
  renderShop();
  renderAchievements();
  loadEntry(state.currentDate);
  setMode(state.mode);
  spawnCreatures();
  checkDecay();
  startParticles();
  setupMouseEffects();
  
  document.getElementById('dayBtn').classList.toggle('active', state.mode === 'day');
  document.getElementById('nightBtn').classList.toggle('active', state.mode === 'night');
}

// ========== SAVE ==========
function save(){
  localStorage.setItem('lj_entries', JSON.stringify(state.entries));
  localStorage.setItem('lj_coins', state.coins);
  localStorage.setItem('lj_streak', state.streak);
  localStorage.setItem('lj_lastWrite', state.lastWrite);
  localStorage.setItem('lj_creatures', JSON.stringify(state.creatures));
  localStorage.setItem('lj_achievements', JSON.stringify(state.achievements));
  localStorage.setItem('lj_purchased', JSON.stringify(state.purchased));
  localStorage.setItem('lj_mode', state.mode);
}

// ========== UI UPDATE ==========
function updateUI(){
  document.getElementById('coins').textContent = state.coins;
  document.getElementById('streak').textContent = state.streak;
}

// ========== FOLDERS ==========
function renderFolders(){
  const container = document.getElementById('folders');
  const dates = Object.keys(state.entries).sort().reverse();
  
  container.innerHTML = dates.map(date => {
    const isActive = date === state.currentDate;
    const preview = state.entries[date]?.text?.slice(0,30) || '';
    return `<div class="folder ${isActive?'active':''}" onclick="loadEntry('${date}')">
      <div>${formatDate(date)}</div>
    </div>`;
  }).join('');
}

function formatDate(dateStr){
  const d = new Date(dateStr);
  const today = new Date();
  if(dateStr === today.toISOString().split('T')[0]) return '📅 Today';
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate()-1);
  if(dateStr === yesterday.toISOString().split('T')[0]) return '📅 Yesterday';
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

// ========== ENTRY MANAGEMENT ==========
function loadEntry(date){
  state.currentDate = date;
  const entry = state.entries[date] || {text:'', plants:[]};
  document.getElementById('journalText').value = entry.text || '';
  document.getElementById('entryTitle').textContent = formatDate(date);
  updateWordCount();
  renderGarden();
  renderFolders();
  analyzeMood();
}

function newEntry(){
  const today = new Date().toISOString().split('T')[0];
  state.currentDate = today;
  if(!state.entries[today]){
    state.entries[today] = {text:'', plants:[]};
    save();
  }
  loadEntry(today);
}

// ========== JOURNAL INPUT ==========
const journalText = document.getElementById('journalText');

journalText.addEventListener('input', ()=>{
  const text = journalText.value;
  
  // Save entry
  if(!state.entries[state.currentDate]){
    state.entries[state.currentDate] = {text:'', plants:[]};
  }
  state.entries[state.currentDate].text = text;
  
  // Update word count
  updateWordCount();
  
  // Analyze mood
  analyzeMood();
  
  // Generate plants
  generatePlants(text);
  
  // Track typing speed for background effects
  const now = Date.now();
  state.typingSpeed = Math.min(1, 100 / (now - state.lastKeyTime));
  state.lastKeyTime = now;
  
  // Reward coins
  rewardCoins(text);
  
  // Check streak
  updateStreak();
  
  // Check achievements
  checkAchievements(text);
  
  // Restore ecosystem from decay
  restoreEcosystem();
  
  save();
  renderFolders();
});

function updateWordCount(){
  const text = journalText.value.trim();
  const words = text ? text.split(/\s+/).length : 0;
  document.getElementById('wordCount').textContent = words;
}

// ========== MOOD ANALYSIS ==========
function analyzeMood(){
  const text = journalText.value.toLowerCase();
  const words = text.split(/\s+/);
  
  let scores = {positive:0, calm:0, negative:0};
  
  words.forEach(word=>{
    const clean = word.replace(/[^a-z]/g,'');
    if(sentimentWords.positive.includes(clean)) scores.positive++;
    if(sentimentWords.calm.includes(clean)) scores.calm++;
    if(sentimentWords.negative.includes(clean)) scores.negative++;
  });
  
  const total = scores.positive + scores.calm + scores.negative;
  let mood = 'neutral';
  let emoji = '😊';
  
  if(total > 0){
    if(scores.positive > scores.calm && scores.positive > scores.negative){
      mood = 'happy';
      emoji = '😄';
    } else if(scores.calm > scores.positive && scores.calm > scores.negative){
      mood = 'calm';
      emoji = '😌';
    } else if(scores.negative > scores.positive && scores.negative > scores.calm){
      mood = 'reflective';
      emoji = '🤔';
    }
  }
  
  state.mood = mood;
  document.getElementById('moodIndicator').textContent = `${emoji} ${mood.charAt(0).toUpperCase() + mood.slice(1)}`;
}

// ========== PLANT GENERATION ==========
function generatePlants(text){
  const words = text.trim().split(/\s+/).filter(w=>w.length>0);
  const garden = document.getElementById('garden');
  const plants = [];
  
  words.forEach((word, i)=>{
    const clean = word.toLowerCase().replace(/[^a-z]/g,'');
    let color = '#4ade80'; // default green
    let type = 'neutral';
    
    if(sentimentWords.positive.some(w=>clean.includes(w))){
      color = '#f472b6';
      type = 'positive';
    } else if(sentimentWords.calm.some(w=>clean.includes(w))){
      color = '#60a5fa';
      type = 'calm';
    } else if(sentimentWords.negative.some(w=>clean.includes(w))){
      color = '#f87171';
      type = 'negative';
    }
    
    plants.push({word: clean, color, type, index: i});
  });
  
  state.entries[state.currentDate].plants = plants;
  renderGarden();
  
  // Check for legendary plant
  if(words.length > 100 && state.mood === 'happy'){
    checkLegendaryPlant();
  }
}

function renderGarden(){
  const garden = document.getElementById('garden');
  const plants = state.entries[state.currentDate]?.plants || [];
  const width = garden.offsetWidth;
  
  garden.innerHTML = '';
  
  plants.forEach((plant, i)=>{
    const el = document.createElement('div');
    el.className = 'plant';
    
    // Growth based on weather
    let growthMod = 1;
    if(state.weather === 'rain') growthMod = 1.5;
    if(state.weather === 'fog') growthMod = 0.7;
    
    const height = Math.min(60, 20 + (i * 0.5) * growthMod);
    const size = Math.min(25, 12 + (i * 0.3));
    
    el.innerHTML = `
      <div class="plant-head" style="
        width:${size}px;
        height:${size}px;
        background:${plant.color};
        --glow:${plant.color}40;
      "></div>
      <div class="plant-stem" style="height:${height}px"></div>
    `;
    
    // Position
    const spacing = width / (plants.length + 1);
    el.style.left = `${spacing * (i + 1)}px`;
    el.style.animationDelay = `${i * 0.1}s`;
    
    garden.appendChild(el);
  });
}

function checkLegendaryPlant(){
  if(state.achievements.includes('legendary')) return;
  
  const garden = document.getElementById('garden');
  const legendary = document.createElement('div');
  legendary.className = 'plant legendary';
  legendary.innerHTML = `
    <div class="plant-head" style="width:40px;height:40px;background:linear-gradient(135deg,gold,#ff6b6b,#818cf8);"></div>
    <div class="plant-stem" style="height:80px;background:linear-gradient(to top,gold,#ffd700);"></div>
  `;
  legendary.style.left = '50%';
  legendary.style.transform = 'translateX(-50%)';
  garden.appendChild(legendary);
  
  unlockAchievement('legendary');
  notify('🌟 A LEGENDARY plant has grown in your garden!');
}

// ========== COINS & REWARDS ==========
function rewardCoins(text){
  const words = text.trim().split(/\s+/).filter(w=>w).length;
  const baseReward = Math.floor(words / 10);
  
  let multiplier = 1;
  if(state.weather === 'rain') multiplier = 1.5;
  if(state.streak >= 7) multiplier *= 1.2;
  
  const reward = Math.floor(baseReward * multiplier);
  
  if(reward > 0 && !state.entries[state.currentDate].rewarded){
    state.coins += reward;
    state.entries[state.currentDate].rewarded = true;
    updateUI();
    save();
  }
}

// ========== STREAK ==========
function updateStreak(){
  const today = new Date().toISOString().split('T')[0];
  
  if(state.lastWrite !== today){
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yesterdayStr = yesterday.toISOString().split('T')[0];
    
    if(state.lastWrite === yesterdayStr){
      state.streak++;
    } else if(state.lastWrite !== today){
      state.streak = 1;
    }
    
    state.lastWrite = today;
    updateUI();
    save();
    
    if(state.streak === 7){
      notify('🔥 7-day streak! You earned a butterfly!');
      addCreature('butterfly');
    }
  }
}

// ========== SHOP ==========
function renderShop(){
  const container = document.getElementById('shop');
  container.innerHTML = shopItems.map(item=>`
    <div class="shop-item" onclick="buyItem('${item.id}')">
      <div class="icon">${item.emoji}</div>
      <div class="info">
        <div class="name">${item.name}</div>
        <div class="desc">${item.desc}</div>
      </div>
      <div class="price">🪙 ${item.price}</div>
    </div>
  `).join('');
}

function buyItem(id){
  const item = shopItems.find(i=>i.id===id);
  if(!item) return;
  
  if(state.coins < item.price){
    notify('Not enough coins! Keep writing ✍️');
    return;
  }
  
  state.coins -= item.price;
  state.purchased[id] = (state.purchased[id] || 0) + 1;
  addCreature(id);
  updateUI();
  save();
  checkAchievements();
  notify(`${item.emoji} ${item.name} joined your ecosystem!`);
}

// ========== CREATURES ==========
function addCreature(type){
  const creature = {
    type,
    id: Date.now(),
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vx: (Math.random() - 0.5) * 2,
    vy: (Math.random() - 0.5) * 2
  };
  state.creatures.push(creature);
  save();
  spawnCreatureElement(creature);
}

function spawnCreatures(){
  state.creatures.forEach(c => spawnCreatureElement(c));
}

function spawnCreatureElement(creature){
  const el = document.createElement('div');
  el.className = `creature ${creature.type}`;
  el.id = `creature-${creature.id}`;
  
  const emojis = {
    bug: '🐞', butterfly: '🦋', bee: '🐝', firefly: '✨',
    dragonfly: '🪰', leaves: '🍃', sparkle: '💫'
  };
  
  el.textContent = emojis[creature.type] || '🐛';
  el.style.left = `${creature.x}px`;
  el.style.top = `${creature.y}px`;
  
  document.body.appendChild(el);
  animateCreature(creature, el);
}

function animateCreature(creature, el){
  let {x, y, vx, vy} = creature;
  let targetX = x, targetY = y;
  let changeTarget = 0;
  
  function update(){
    // Weather affects speed
    let speedMod = 1;
    if(state.weather === 'fog') speedMod = 0.3;
    if(state.weather === 'storm') speedMod = 2;
    
    changeTarget++;
    if(changeTarget > 100 + Math.random() * 200){
      targetX = Math.random() * (window.innerWidth - 50);
      targetY = Math.random() * (window.innerHeight - 50);
      changeTarget = 0;
    }
    
    // Move toward target
    const dx = targetX - x;
    const dy = targetY - y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    if(dist > 5){
      vx += (dx / dist) * 0.1 * speedMod;
      vy += (dy / dist) * 0.1 * speedMod;
    }
    
    // Add randomness
    vx += (Math.random() - 0.5) * 0.2 * speedMod;
    vy += (Math.random() - 0.5) * 0.2 * speedMod;
    
    // Damping
    vx *= 0.98;
    vy *= 0.98;
    
    // Clamp speed
    const maxSpeed = 3 * speedMod;
    const speed = Math.sqrt(vx*vx + vy*vy);
    if(speed > maxSpeed){
      vx = (vx/speed) * maxSpeed;
      vy = (vy/speed) * maxSpeed;
    }
    
    x += vx;
    y += vy;
    
    // Bounds
    x = Math.max(0, Math.min(window.innerWidth - 30, x));
    y = Math.max(60, Math.min(window.innerHeight - 30, y));
    
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;
    el.style.transform = vx > 0 ? 'scaleX(1)' : 'scaleX(-1)';
    
    // Light trail for night mode
    if(state.mode === 'night' && creature.type === 'firefly'){
      createTrail(x + 12, y + 12);
    }
    
    creature.x = x;
    creature.y = y;
    
    requestAnimationFrame(update);
  }
  
  update();
}

function createTrail(x, y){
  if(Math.random() > 0.3) return;
  const trail = document.createElement('div');
  trail.className = 'trail';
  trail.style.left = `${x}px`;
  trail.style.top = `${y}px`;
  document.body.appendChild(trail);
  
  setTimeout(()=>trail.remove(), 500);
}

// ========== ACHIEVEMENTS ==========
function renderAchievements(){
  const container = document.getElementById('achievements');
  container.innerHTML = achievementDefs.map(ach=>{
    const unlocked = state.achievements.includes(ach.id);
    return `
      <div class="achievement ${unlocked?'':'locked'}">
        <div class="title">${ach.name}</div>
        <div class="desc">${ach.desc}</div>
      </div>
    `;
  }).join('');
}

function checkAchievements(text = ''){
  achievementDefs.forEach(ach=>{
    if(state.achievements.includes(ach.id)) return;
    
    let unlocked = false;
    
    if(ach.id === 'words100'){
      const words = text.trim().split(/\s+/).filter(w=>w).length;
      unlocked = words >= 100;
    } else if(ach.id === 'words500'){
      const words = text.trim().split(/\s+/).filter(w=>w).length;
      unlocked = words >= 500;
    } else if(ach.check){
      unlocked = ach.check();
    }
    
    if(unlocked){
      unlockAchievement(ach.id);
    }
  });
}

function unlockAchievement(id){
  if(state.achievements.includes(id)) return;
  
  state.achievements.push(id);
  save();
  renderAchievements();
  
  const ach = achievementDefs.find(a=>a.id===id);
  if(ach){
    notify(`🏆 Achievement: ${ach.name}`);
    state.coins += 25;
    updateUI();
    
    if(ach.reward === '🦋'){
      addCreature('butterfly');
    }
  }
}

// ========== MODE ==========
function setMode(mode){
  state.mode = mode;
  document.body.classList.toggle('night', mode === 'night');
  document.getElementById('dayBtn').classList.toggle('active', mode === 'day');
  document.getElementById('nightBtn').classList.toggle('active', mode === 'night');
  
  // Night mode fireflies
  if(mode === 'night'){
    startFireflies();
  } else {
    document.querySelectorAll('.firefly-particle').forEach(el=>el.remove());
  }
  
  save();
}

function startFireflies(){
  for(let i = 0; i < 15; i++){
    setTimeout(()=>createFirefly(), i * 200);
  }
}

function createFirefly(){
  if(state.mode !== 'night') return;
  
  const el = document.createElement('div');
  el.className = 'particle firefly firefly-particle';
  el.style.left = `${Math.random() * 100}vw`;
  el.style.top = `${Math.random() * 100}vh`;
  document.body.appendChild(el);
  
  animateFirefly(el);
}

function animateFirefly(el){
  let x = parseFloat(el.style.left);
  let y = parseFloat(el.style.top);
  
  function drift(){
    if(state.mode !== 'night'){
      el.remove();
      return;
    }
    
    x += (Math.random() - 0.5) * 2;
    y += (Math.random() - 0.5) * 2;
    
    x = Math.max(0, Math.min(100, x));
    y = Math.max(0, Math.min(100, y));
    
    el.style.left = `${x}vw`;
    el.style.top = `${y}vh`;
    
    setTimeout(drift, 50);
  }
  
  drift();
}

// ========== WEATHER ==========
function setWeather(weather){
  state.weather = weather;
  
  document.querySelectorAll('.toggle-row .toggle-btn').forEach(btn=>{
    if(btn.id.includes('Btn')){
      const w = btn.id.replace('Btn','');
      btn.classList.toggle('active', w === weather);
    }
  });
  
  const overlay = document.getElementById('weatherOverlay');
  overlay.innerHTML = '';
  
  if(weather === 'rain'){
    for(let i = 0; i < 100; i++){
      const drop = document.createElement('div');
      drop.className = 'raindrop';
      drop.style.left = `${Math.random() * 100}%`;
      drop.style.animationDelay = `${Math.random() * 0.5}s`;
      drop.style.animationDuration = `${0.3 + Math.random() * 0.3}s`;
      overlay.appendChild(drop);
    }
  } else if(weather === 'fog'){
    const fog = document.createElement('div');
    fog.className = 'fog';
    overlay.appendChild(fog);
  } else if(weather === 'storm'){
    setInterval(()=>{
      if(state.weather !== 'storm') return;
      const lightning = document.createElement('div');
      lightning.className = 'lightning';
      overlay.appendChild(lightning);
      
      setTimeout(()=>{
        lightning.style.opacity = '0.8';
        setTimeout(()=>{
          lightning.style.opacity = '0';
          setTimeout(()=>lightning.remove(), 200);
        }, 100);
      }, 10);
    }, 3000 + Math.random() * 5000);
    
    // Rain during storm
    for(let i = 0; i < 150; i++){
      const drop = document.createElement('div');
      drop.className = 'raindrop';
      drop.style.left = `${Math.random() * 100}%`;
      drop.style.animationDelay = `${Math.random() * 0.3}s`;
      drop.style.animationDuration = `${0.2 + Math.random() * 0.2}s`;
      overlay.appendChild(drop);
    }
  }
  
  renderGarden();
}

// ========== DECAY SYSTEM ==========
function checkDecay(){
  if(!state.lastWrite) return;
  
  const last = new Date(state.lastWrite);
  const now = new Date();
  const days = Math.floor((now - last) / (1000 * 60 * 60 * 24));
  
  if(days >= 2){
    const decayLevel = Math.min(0.5, days * 0.1);
    document.getElementById('decayOverlay').style.opacity = decayLevel;
    
    // Slow down creatures
    document.querySelectorAll('.creature').forEach(el=>{
      el.style.filter = `grayscale(${decayLevel})`;
    });
  }
}

function restoreEcosystem(){
  document.getElementById('decayOverlay').style.opacity = 0;
  document.querySelectorAll('.creature').forEach(el=>{
    el.style.filter = '';
  });
}

// ========== PARTICLES ==========
function startParticles(){
  // Background ambient particles
  setInterval(()=>{
    if(Math.random() > 0.7) return;
    
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = `${Math.random() * 100}vw`;
    particle.style.top = `${Math.random() * 100}vh`;
    particle.style.width = `${2 + Math.random() * 4}px`;
    particle.style.height = particle.style.width;
    particle.style.background = state.mode === 'night' 
      ? 'rgba(200,200,255,0.3)' 
      : 'rgba(129,199,132,0.3)';
    particle.style.borderRadius = '50%';
    particle.style.animation = 'shimmer-fade 2s ease-out forwards';
    
    document.body.appendChild(particle);
    setTimeout(()=>particle.remove(), 2000);
  }, 500);
}

// ========== MOUSE EFFECTS ==========
function setupMouseEffects(){
  let lastX = 0, lastY = 0;
  
  document.addEventListener('mousemove', (e)=>{
    const dist = Math.sqrt((e.clientX-lastX)**2 + (e.clientY-lastY)**2);
    
    if(dist > 20){
      createShimmer(e.clientX, e.clientY);
      lastX = e.clientX;
      lastY = e.clientY;
    }
  });
  
  document.addEventListener('click', (e)=>{
    // Spawn growth sparks on click
    for(let i = 0; i < 5; i++){
      setTimeout(()=>createSpark(e.clientX, e.clientY), i * 50);
    }
  });
}

function createShimmer(x, y){
  const shimmer = document.createElement('div');
  shimmer.className = 'shimmer';
  shimmer.style.left = `${x}px`;
  shimmer.style.top = `${y}px`;
  document.body.appendChild(shimmer);
  setTimeout(()=>shimmer.remove(), 600);
}

function createSpark(x, y){
  const spark = document.createElement('div');
  spark.className = 'spark';
  
  const angle = Math.random() * Math.PI * 2;
  const dist = 20 + Math.random() * 30;
  
  spark.style.left = `${x + Math.cos(angle) * dist}px`;
  spark.style.top = `${y + Math.sin(angle) * dist}px`;
  spark.style.background = ['#4ade80','#f472b6','#60a5fa','#fbbf24'][Math.floor(Math.random()*4)];
  
  document.body.appendChild(spark);
  setTimeout(()=>spark.remove(), 800);
}

// ========== NOTIFICATIONS ==========
function notify(message){
  const el = document.getElementById('notification');
  el.textContent = message;
  el.classList.add('show');
  
  setTimeout(()=>el.classList.remove('show'), 3000);
}

// ========== START ==========
init();
</script>
