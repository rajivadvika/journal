<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Living Journal System</title>

<style>
:root{
  --bg:#f7f6f3;
  --text:#1f2937;
  --card:#ffffffcc;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  transition:0.4s;
}

/* DARK MODE */
body.dark{
  --bg:#0b1020;
  --text:#e5e7eb;
  background:var(--bg);
}

/* LAYOUT */
.app{
  display:grid;
  grid-template-columns:220px 1fr 220px;
  height:100vh;
}

/* FOLDERS */
.sidebar{
  padding:12px;
  border-right:1px solid rgba(120,120,120,0.2);
  overflow:auto;
}

.folder{
  padding:10px;
  margin:6px 0;
  background:var(--card);
  border-radius:10px;
  cursor:pointer;
}

/* CENTER */
.main{
  padding:20px;
  position:relative;
}

textarea{
  width:100%;
  height:160px;
  border:none;
  outline:none;
  background:transparent;
  font-size:16px;
  color:inherit;
}

/* WORD FLOWER FIELD */
.field{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  padding:10px;
  pointer-events:none;
}

.flower{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#a78bfa;
  opacity:0.8;
  animation:grow 0.3s ease;
}

@keyframes grow{
  from{transform:scale(0);}
  to{transform:scale(1);}
}

/* TASK PANEL */
.tasks{
  padding:10px;
  border-left:1px solid rgba(120,120,120,0.2);
}

.task{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
  padding:6px;
  background:var(--card);
  border-radius:8px;
  cursor:pointer;
}

/* COINS */
.coin{
  position:fixed;
  top:10px;
  right:10px;
  background:gold;
  padding:8px 12px;
  border-radius:20px;
  font-weight:bold;
}

/* BUGS */
.bug{
  position:fixed;
  font-size:14px;
  animation:fly 6s infinite linear;
}

@keyframes fly{
  0%{transform:translate(0,0);}
  50%{transform:translate(40px,-40px);}
  100%{transform:translate(0,0);}
}
</style>
</head>

<body>

<div class="coin">🪙 <span id="coins">0</span></div>

<div class="app">

<!-- FOLDERS -->
<div class="sidebar">
  <h3>📁 Days</h3>
  <div id="folders"></div>
  <button onclick="newDay()">+ New Day</button>
  <button onclick="toggleMode()">Toggle Mode</button>
</div>

<!-- MAIN -->
<div class="main">
  <h2 id="dayLabel">Today</h2>

  <textarea id="text" placeholder="Write..."></textarea>

  <div class="field" id="field"></div>
</div>

<!-- TASKS -->
<div class="tasks">
  <h3>📌 Daily Tasks</h3>
  <div id="tasks"></div>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("journalSys") || "{}");
let currentDay = new Date().toISOString().split("T")[0];

let coins = parseInt(localStorage.getItem("coins") || "0");

let tasks = [
  {t:"Write 50 words", done:false},
  {t:"Reflect 1 feeling", done:false},
  {t:"Describe moment", done:false},
  {t:"Gratitude line", done:false},
  {t:"One intention", done:false}
];

/* INIT */
document.getElementById("coins").innerText = coins;

/* SAVE DAY */
function save(){
  data[currentDay] = {
    text: text.value
  };

  localStorage.setItem("journalSys", JSON.stringify(data));
}

/* WORD FLOWERS */
text.oninput = () => {

  save();

  let words = text.value.trim().split(/\s+/);
  let field = document.getElementById("field");

  field.innerHTML = "";

  words.forEach(w => {
    if(!w) return;

    let f = document.createElement("div");
    f.className = "flower";
    field.appendChild(f);
  });
};

/* FOLDERS */
function renderFolders(){

  let box = document.getElementById("folders");
  box.innerHTML = "";

  Object.keys(data).forEach(d => {

    let div = document.createElement("div");
    div.className = "folder";
    div.innerText = d;

    div.onclick = () => {
      currentDay = d;
      text.value = data[d].text || "";
    };

    box.appendChild(div);
  });
}

function newDay(){
  currentDay = new Date().toISOString().split("T")[0];
  text.value = "";
}

/* TASKS */
function renderTasks(){

  let box = document.getElementById("tasks");
  box.innerHTML = "";

  tasks.forEach((t,i) => {

    let div = document.createElement("div");
    div.className = "task";
    div.innerHTML = `${t.t} ${t.done ? "✔️" : ""}`;

    div.onclick = () => {

      if(!t.done){
        t.done = true;
        coins += 10;
        localStorage.setItem("coins", coins);
        document.getElementById("coins").innerText = coins;
      }

      renderTasks();
    };

    box.appendChild(div);
  });
}

/* BUG SHOP (simple demo) */
function spawnBug(){

  let b = document.createElement("div");
  b.className = "bug";
  b.innerText = "🐞";

  b.style.left = Math.random()*90 + "vw";
  b.style.top = Math.random()*90 + "vh";

  document.body.appendChild(b);
}

/* TOGGLE MODE */
function toggleMode(){
  document.body.classList.toggle("dark");

  if(document.body.classList.contains("dark")){
    spawnBug();
  }
}

/* INIT */
renderFolders();
renderTasks();

</script>

</body>
</html>
