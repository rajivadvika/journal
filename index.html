<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Living Journal Garden</title>

<style>
:root{
  --bg:#f7f6f3;
  --text:#1f2937;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  transition:1s;
}

/* NIGHT MODE */
body.night{
  --bg:#0b1020;
  --text:#e5e7eb;
  background:var(--bg);
}

/* LAYOUT */
.app{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.7);
  padding:16px;
  border-radius:16px;
  margin-bottom:16px;
}

/* GARDEN */
.garden{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
  gap:12px;
}

/* PLANT */
.plant{
  height:120px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
}

.stem{
  width:5px;
  background:#16a34a;
  border-radius:10px;
  transition:1s;
}

.flower{
  width:18px;
  height:18px;
  border-radius:50%;
  position:absolute;
  top:10px;
  transition:1s;
}

/* glow at night */
.night .flower{
  box-shadow:0 0 12px rgba(150,200,255,0.9);
}

/* butterflies */
.butterfly{
  position:absolute;
  font-size:14px;
  animation:fly 6s linear infinite;
}

@keyframes fly{
  0%{transform:translate(0,0);}
  50%{transform:translate(20px,-40px);}
  100%{transform:translate(0,0);}
}

/* textarea */
textarea{
  width:100%;
  height:120px;
  border:none;
  outline:none;
  font-size:16px;
  background:transparent;
  resize:none;
}
</style>
</head>

<body>

<div class="app">

<div class="card">
  <h2>🌿 Living Journal Garden</h2>

  <button onclick="toggleNight()">🌙 Toggle Night</button>
  <button onclick="setWeather('sun')">☀️ Sun</button>
  <button onclick="setWeather('rain')">🌧️ Rain</button>
  <button onclick="setWeather('drought')">🔥 Drought</button>

  <p id="weatherLabel">Weather: Sun</p>

  <textarea id="text" placeholder="Write your thoughts..."></textarea>
  <button onclick="saveEntry()">Plant Memory 🌱</button>
</div>

<div class="card">
  <h3>🌼 Your Garden</h3>
  <div id="garden" class="garden"></div>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("gardenSim") || "[]");
let weather = "sun";
let lastWrite = Date.now();

/* simple AI-ish classifier */
function getPlantType(text){

  text = text.toLowerCase();

  if(text.includes("happy") || text.includes("love")) return "pink";
  if(text.includes("angry") || text.includes("fire")) return "red";
  if(text.includes("calm") || text.includes("peace")) return "blue";
  return "green";
}

/* weather effects */
function weatherMultiplier(){
  if(weather === "rain") return 1.5;
  if(weather === "drought") return 0.6;
  return 1;
}

/* save entry */
function saveEntry(){

  const text = document.getElementById("text").value;

  const entry = {
    text,
    len: text.length,
    type: getPlantType(text),
    time: Date.now()
  };

  data.push(entry);
  localStorage.setItem("gardenSim", JSON.stringify(data));

  document.getElementById("text").value = "";
  lastWrite = Date.now();

  renderGarden();
}

/* weather */
function setWeather(w){
  weather = w;
  document.getElementById("weatherLabel").innerText =
    "Weather: " + w;
}

/* night mode */
function toggleNight(){
  document.body.classList.toggle("night");
}

/* decay system */
function decayFactor(entry){
  let hours = (Date.now() - entry.time) / 3600000;

  if(hours < 12) return 1;
  if(hours < 24) return 0.7;
  if(hours < 48) return 0.4;
  return 0.2;
}

/* render garden */
function renderGarden(){

  const garden = document.getElementById("garden");
  garden.innerHTML = "";

  data.forEach(e => {

    let size = Math.min(100, 20 + e.len * 1.2);

    size *= weatherMultiplier();
    size *= decayFactor(e);

    let color =
      e.type === "red" ? "#f87171" :
      e.type === "blue" ? "#60a5fa" :
      e.type === "pink" ? "#f472b6" :
      "#4ade80";

    let glow = document.body.classList.contains("night")
      ? "0 0 12px rgba(120,200,255,0.6)"
      : "none";

    garden.innerHTML += `
      <div class="plant">
        <div class="stem" style="height:${size}px"></div>
        <div class="flower" style="background:${color}; box-shadow:${glow}"></div>
      </div>
    `;
  });

  spawnButterflies();
}

/* butterflies for happy mood plants */
function spawnButterflies(){

  document.querySelectorAll(".butterfly").forEach(b=>b.remove());

  let happyPlants = data.filter(e => getPlantType(e.text) === "pink");

  happyPlants.slice(0,3).forEach(() => {

    let b = document.createElement("div");
    b.className = "butterfly";
    b.innerHTML = "🦋";

    b.style.left = Math.random()*80 + "%";
    b.style.top = Math.random()*80 + "%";

    document.body.appendChild(b);
  });
}

/* auto decay refresh */
setInterval(renderGarden, 60000);

renderGarden();

</script>

</body>
</html>
