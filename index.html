<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-color: #333;
            --card-text: #444;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #2b1055 0%, #7597de 100%);
            --glass-bg: rgba(20, 20, 20, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #f0f0f0;
            --card-text: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Custom Cursor */
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            padding: 2rem;
            background-attachment: fixed;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%23ff9a9e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>') 12 12, auto;
        }

        /* Ensure interactive elements keep the custom cursor or change to a pointer */
        button, select, input, textarea {
            cursor: pointer;
        }
        
        textarea, input[type="text"] {
            cursor: text;
        }

        /* Cursor Trail Styling */
        .trail-particle {
            position: fixed;
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            z-index: 9999;
            transform: translate(-50%, -50%);
            animation: fadeOut 0.5s ease forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.1); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-family: 'Lora', serif;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .ambient-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--glass-bg);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .ambient-controls select {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            outline: none;
            padding: 0;
            cursor: pointer;
            width: auto;
        }

        .btn-glass {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
        }

        .journal-form {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 3rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        input[type="text"], select, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.8rem;
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            outline: none;
        }

        [data-theme="dark"] input[type="text"], 
        [data-theme="dark"] select, 
        [data-theme="dark"] textarea {
            background: rgba(0, 0, 0, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
            margin-bottom: 0.5rem;
            font-family: 'Lora', serif;
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .word-count { font-size: 0.85rem; opacity: 0.8; }

        button.save-btn {
            background: #fff;
            color: #ff9a9e;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] button.save-btn {
            background: #2b1055;
            color: #fff;
        }

        .entries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .entry-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            position: relative;
        }

        .entry-header { display: flex; justify-content: space-between; margin-bottom: 1rem; opacity: 0.8; font-size: 0.9rem;}
        .entry-title { font-family: 'Lora', serif; font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--text-color); }
        .entry-content { font-size: 0.95rem; color: var(--card-text); line-height: 1.6; white-space: pre-wrap; }
        
        .delete-btn {
            position: absolute; bottom: 1rem; right: 1rem; background: none; border: none; color: #ff6b6b; font-size: 0.9rem; opacity: 0; transition: opacity 0.3s;
        }
        .entry-card:hover .delete-btn { opacity: 1; }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>My Journal</h1>
            <div class="header-controls">
                <div class="ambient-controls">
                    <span>🎧</span>
                    <select id="bg-sound" onchange="changeSound()">
                        <option value="none">Silence</option>
                        <option value="https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg">Heavy Rain</option>
                        <option value="https://actions.google.com/sounds/v1/water/waves_crashing_on_rock_beach.ogg">Ocean Waves</option>
                        <option value="https://actions.google.com/sounds/v1/crowds/cafe_crowd_loop.ogg">Coffee Shop</option>
                    </select>
                    <button class="btn-glass" id="play-pause-btn" onclick="toggleAudio()" style="padding: 0.2rem 0.6rem;">▶</button>
                </div>
                <button class="btn-glass" onclick="toggleTheme()">🌙 Theme</button>
            </div>
        </header>

        <div class="journal-form">
            <div class="controls">
                <input type="text" id="entry-title" placeholder="Give your entry a title...">
                <select id="entry-mood">
                    <option value="😊">😊 Happy</option>
                    <option value="😌">😌 Calm</option>
                    <option value="😔">😔 Sad</option>
                    <option value="✨">✨ Inspired</option>
                    <option value="✈️">✈️ Adventurous</option>
                </select>
            </div>
            
            <textarea id="entry-content" placeholder="Dear journal, today..." onkeyup="handleTyping(event)"></textarea>
            
            <div class="form-footer">
                <span class="word-count">Words: <span id="word-counter">0</span></span>
                <button class="save-btn" onclick="saveEntry()">Save Entry</button>
            </div>
        </div>

        <div class="entries-grid" id="entries-container"></div>
    </div>

    <!-- Hidden Audio Element for Background Sound -->
    <audio id="ambient-audio" loop></audio>

    <script>
        // --- CURSOR TRAIL LOGIC ---
        document.addEventListener('mousemove', function(e) {
            const particle = document.createElement('div');
            particle.className = 'trail-particle';
            particle.style.left = e.clientX + 'px';
            particle.style.top = e.clientY + 'px';
            document.body.appendChild(particle);
            setTimeout(() => { particle.remove(); }, 500);
        });

        // --- TYPING SOUND LOGIC (Web Audio API for zero latency) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTypeSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Soft click settings
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
            
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime); // very quiet
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function handleTyping(e) {
            updateWordCount();
            // Don't play sound on shift/ctrl/alt keys
            if (!['Shift', 'Control', 'Alt', 'Meta', 'CapsLock'].includes(e.key)) {
                playTypeSound();
            }
        }

        // --- BACKGROUND AUDIO LOGIC ---
        const audioEl = document.getElementById('ambient-audio');
        const playBtn = document.getElementById('play-pause-btn');

        function changeSound() {
            const select = document.getElementById('bg-sound');
            if (select.value === 'none') {
                audioEl.pause();
                playBtn.innerText = '▶';
                audioEl.src = '';
            } else {
                audioEl.src = select.value;
                audioEl.play().then(() => {
                    playBtn.innerText = '⏸';
                }).catch(e => console.log("Audio needs interaction first"));
            }
        }

        function toggleAudio() {
            if (audioEl.src === '' || audioEl.src.includes(window.location.href)) return;
            if (audioEl.paused) {
                audioEl.play();
                playBtn.innerText = '⏸';
            } else {
                audioEl.pause();
                playBtn.innerText = '▶';
            }
        }

        // --- CORE JOURNAL LOGIC ---
        let entries = JSON.parse(localStorage.getItem('journalEntries')) || [];

        window.onload = () => {
            renderEntries();
            checkSavedTheme();
        };

        function updateWordCount() {
            const text = document.getElementById('entry-content').value;
            const count = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            document.getElementById('word-counter').innerText = count;
        }

        function saveEntry() {
            const titleInput = document.getElementById('entry-title').value;
            const contentInput = document.getElementById('entry-content').value;
            const moodInput = document.getElementById('entry-mood').value;

            if (!contentInput.trim()) return alert("Please write something!");

            const newEntry = {
                id: Date.now(),
                title: titleInput || "Untitled Entry",
                content: contentInput,
                mood: moodInput,
                date: new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
            };

            entries.unshift(newEntry);
            localStorage.setItem('journalEntries', JSON.stringify(entries));

            document.getElementById('entry-title').value = '';
            document.getElementById('entry-content').value = '';
            updateWordCount();
            renderEntries();
        }

        function deleteEntry(id) {
            entries = entries.filter(entry => entry.id !== id);
            localStorage.setItem('journalEntries', JSON.stringify(entries));
            renderEntries();
        }

        function renderEntries() {
            const container = document.getElementById('entries-container');
            container.innerHTML = '';
            entries.forEach(entry => {
                const card = document.createElement('div');
                card.className = 'entry-card';
                card.innerHTML = `
                    <div class="entry-header"><span>${entry.date}</span><span>${entry.mood}</span></div>
                    <h3 class="entry-title">${escapeHTML(entry.title)}</h3>
                    <div class="entry-content">${escapeHTML(entry.content)}</div>
                    <button class="delete-btn" onclick="deleteEntry(${entry.id})">Delete</button>
                `;
                container.appendChild(card);
            });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        // --- THEME LOGIC ---
        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            isDark ? body.removeAttribute('data-theme') : body.setAttribute('data-theme', 'dark');
            localStorage.setItem('journalTheme', isDark ? 'light' : 'dark');
        }

        function checkSavedTheme() {
            if (localStorage.getItem('journalTheme') === 'dark') document.body.setAttribute('data-theme', 'dark');
        }
    </script>
</body>
</html>
