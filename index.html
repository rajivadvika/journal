<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Journal Garden</title>

<style>
:root{
  --bg:#f7f6f3;
  --card:#ffffffcc;
  --text:#1f2937;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* layout */
.app{
  display:grid;
  grid-template-columns: 1fr;
  gap:20px;
  padding:20px;
  max-width:900px;
  margin:auto;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* flower preview */
.preview{
  height:180px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}

.stem{
  width:6px;
  background:#22c55e;
  border-radius:10px;
  transition:0.3s;
}

.flower{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.petals{
  width:28px;
  height:28px;
  border-radius:50%;
  position:absolute;
  margin-top:-18px;
  transition:0.3s;
  opacity:0.3;
}

/* textarea */
textarea{
  width:100%;
  height:160px;
  border:none;
  outline:none;
  font-size:16px;
  background:transparent;
  resize:none;
}

/* garden */
.garden{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
  gap:12px;
  margin-top:10px;
}

.plant{
  height:120px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
}

.plantStem{
  width:5px;
  background:#16a34a;
  border-radius:10px;
}

.plantFlower{
  width:18px;
  height:18px;
  border-radius:50%;
  position:absolute;
  top:10px;
}
</style>
</head>

<body>

<div class="app">

<div class="card">

  <h2>🌿 Write your garden</h2>

  <div class="preview">
    <div class="flower">
      <div id="stem" class="stem"></div>
      <div id="petals" class="petals"></div>
    </div>
  </div>

  <textarea id="text" placeholder="Write something..."></textarea>

  <button onclick="saveEntry()">Save to Garden 🌸</button>
</div>

<div class="card">
  <h3>🌼 Your Garden</h3>
  <div id="garden" class="garden"></div>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("garden") || "[]");

const text = document.getElementById("text");
const stem = document.getElementById("stem");
const petals = document.getElementById("petals");

const moodColors = {
  happy:"#f472b6",
  calm:"#60a5fa",
  deep:"#a78bfa",
  fire:"#f97316"
};

/* live plant growth */
function growLivePlant(){

  let len = text.value.length;

  let h = Math.min(160, 20 + len * 2);
  stem.style.height = h + "px";

  let bloom = Math.min(1, len / 100);

  petals.style.background = "#a78bfa";
  petals.style.opacity = 0.2 + bloom;
  petals.style.transform = `scale(${0.5 + bloom})`;
}

text.addEventListener("input", growLivePlant);

/* save entry as plant */
function saveEntry(){

  const entry = {
    text: text.value,
    len: text.value.length
  };

  data.push(entry);
  localStorage.setItem("garden", JSON.stringify(data));

  text.value = "";
  growLivePlant();
  renderGarden();
}

/* render garden */
function renderGarden(){

  const garden = document.getElementById("garden");
  garden.innerHTML = "";

  data.forEach(e => {

    let height = Math.min(100, 20 + e.len * 1.5);

    let color = Object.values(moodColors)[Math.floor(Math.random()*4)];

    garden.innerHTML += `
      <div class="plant">
        <div class="plantStem" style="height:${height}px"></div>
        <div class="plantFlower" style="background:${color}"></div>
      </div>
    `;
  });
}

growLivePlant();
renderGarden();

</script>

</body>
</html>
